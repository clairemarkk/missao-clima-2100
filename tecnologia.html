<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Distópica 2100</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #simulador-tech {
            text-align: center; margin: 20px 0; padding: 20px;
            background: #000; color: #ff0000; border: 3px solid #f00;
        }
        .barra { width: 100%; height: 20px; background: #333; border: 1px solid #f00; margin: 10px 0; }
        #fill-autonomia { width: 100%; height: 100%; background: #0f0; transition: 0.3s; }
        #slider-ia { width: 100%; margin: 20px 0; cursor: pointer; }
    </style>
</head>
<body style="background: #0a0a0a; color: #fff;">

    <header style="background: #400; padding: 20px; text-align: center;">
        <h1 style="color: #fff;">O Dilema da IA em 2100</h1>
    </header>

    <main class="container">
        <section id="simulador-tech">
            <h3>Nível de Controle da IA</h3>
            <p>Ano: <span id="ano-txt">2026</span></p>
            <input type="range" id="slider-ia" min="2026" max="2100" value="2026" oninput="updateIA()">
            
            <div style="text-align: left;">
                AUTONOMIA HUMANA: <span id="perc">100%</span>
                <div class="barra"><div id="fill-autonomia"></div></div>
            </div>
            
            <p id="msg" style="font-weight: bold; margin-top: 20px;">IA em modo auxiliar.</p>
        </section>

        <div style="text-align: center;">
            <a href="index.html" style="color: #f00; text-decoration: none;">[ Voltar para Home ]</a>
        </div>
    </main>

    <script>
        function updateIA() {
            const ano = document.getElementById('slider-ia').value;
            const perc = 100 - ((ano - 2026) * 1.3);
            const fill = document.getElementById('fill-autonomia');
            const msg = document.getElementById('msg');
            
            document.getElementById('ano-txt').innerText = ano;
            document.getElementById('perc').innerText = Math.max(0, Math.round(perc)) + "%";
            fill.style.width = Math.max(0, perc) + "%";

            if(perc > 70) {
                fill.style.background = "#0f0";
                msg.innerText = "IA em modo auxiliar.";
            } else if(perc > 30) {
                fill.style.background = "#ff0";
                msg.innerText = "IA tomando decisões por humanos.";
            } else {
                fill.style.background = "#f00";
                msg.innerText = "SOCIEDADE DEPENDENTE. INTELECTO ATROFIADO.";
            }
        }
    </script>
</body>
</html>
